name: ATSH CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc, clang]
        crypto: [openssl, devnotls]
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y libpam0g-dev libssl-dev libcrypt-dev
    
    - name: Build (${{ matrix.compiler }}, crypto=${{ matrix.crypto }})
      run: |
        if [ "${{ matrix.crypto }}" = "devnotls" ]; then
          make CC=${{ matrix.compiler }} DEV_NOTLS=1
        else
          make CC=${{ matrix.compiler }}
        fi

  termux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
    
    - name: Install deps
      run: sudo apt-get update && sudo apt-get install -y clang libssl-dev libpam0g-dev
    
    - name: Build Termux (simulated)
      run: |
        make CC=clang \
             CFLAGS="-I$(pwd)/termux-auth -DANDROID -D_POSIX_C_SOURCE=200809L -D_DEFAULT_SOURCE -Wall -Wextra -O2 -std=c11" \
             LDFLAGS="-lutil -lssl -lcrypto -lcrypt -lpam"

  freebsd:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install clang
      run: sudo apt-get update && sudo apt-get install -y clang libpam0g-dev libssl-dev
    
    - name: Syntax check (FreeBSD)
      run: |
        clang -fsyntax-only -Wall -Wextra -std=c11 -DFreeBSD \
          -D_POSIX_C_SOURCE=200809L -D_DEFAULT_SOURCE \
          -I src/ \
          src/atshd.c src/atshc.c src/auth.c src/crypto.c

  analyze:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install tools
      run: sudo apt-get update && sudo apt-get install -y clang-tools cppcheck libpam0g-dev libssl-dev
    
    - name: Clang static analysis
      run: |
        clang --analyze -I src/ \
          -D_POSIX_C_SOURCE=200809L -D_DEFAULT_SOURCE \
          src/atshd.c src/atshc.c src/auth.c src/crypto.c \
          2>&1 | tee clang-analyze.log
        echo "Analysis complete - review warnings above"
    
    - name: Cppcheck
      run: cppcheck --enable=all -I src/ \
        -D_POSIX_C_SOURCE=200809L -D_DEFAULT_SOURCE \
        src/ 2>&1 | tee cppcheck.log
