name: ATSH CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc, clang]
        crypto: [openssl, devnotls]
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: sudo apt-get install -y libpam0g-dev libssl-dev libcrypt-dev
    
    - name: Build (${{ matrix.compiler }}, crypto=${{ matrix.crypto }})
      run: |
        if [ "${{ matrix.crypto }}" = "devnotls" ]; then
          make CC=${{ matrix.compiler }} DEV_NOTLS=1
        else
          make CC=${{ matrix.compiler }}
        fi
    
    - name: Verify
      run: file atshd atshc && ./atshd -h  true && ./atshc -h  true

  termux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
    
    - name: Install deps
      run: sudo apt-get install -y clang libssl-dev
    
    - name: Build Termux (simulated)
      run: |
        make CC=clang \
             CFLAGS="-I$(pwd)/termux-auth -DANDROID -Wall -Wextra -O2 -std=c11" \
             LDFLAGS="-lutil -lssl -lcrypto -lcrypt"

  freebsd:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install clang
      run: sudo apt-get install -y clang
    
    - name: Syntax check (FreeBSD)
      run: |
        clang -fsyntax-only -Wall -Wextra -std=c11 -DFreeBSD \
          -I src/ \
          src/atshd.c src/atshc.c src/auth.c src/crypto.c \
          -lutil -lssl -lcrypto -lpam

  analyze:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install tools
      run: sudo apt-get install -y clang-tools cppcheck
    
    - name: Clang static analysis
      run: |
        clang --analyze -I src/ \
          src/atshd.c src/atshc.c src/auth.c src/crypto.c \
          2>&1 | tee clang-analyze.log
        ! grep -q "warning:" clang-analyze.log || exit 1
    
    - name: Cppcheck
      run: cppcheck --enable=all -I src/ src/ 2>&1 | tee cppcheck.log

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Check unsafe functions
      run: |
        if grep -rn 'strcpy\|strcat\|sprintf\|gets' src/; then
          echo "FAIL: unsafe functions found"
          exit 1
        fi
        echo "OK: no unsafe functions"
        if grep -rn 'system(' src/; then
          echo "WARNING: system() calls found (acceptable for OpenSSL keygen)"
        fi
